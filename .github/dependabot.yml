version: 2
updates:
  # npm (Node.js)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependabot"
      - "npm"
    commit-message:
      prefix: "npm"
    reviewers:
      - "channel-sen"

  # pip (Python)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependabot"
      - "python"
    commit-message:
      prefix: "pip"
    reviewers:
      - "channel-sen"

  # Maven (Java)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependabot"
      - "java"
    commit-message:
      prefix: "mvn"
    reviewers:
      - "channel-sen"

  # Bundler (Ruby)
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependabot"
      - "ruby"
    commit-message:
      prefix: "gem"
    reviewers:
      - "channel-sen"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependabot"
      - "github-actions"
